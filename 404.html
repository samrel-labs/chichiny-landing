<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lost in the stream · Chichiny</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <style>
        /* ===== Reset & CSS Variables (همانند صفحه اصلی) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --surface: #f8f8fa;
            --border: #efeff1;
            --text-primary: #1a1a1e;
            --text-secondary: #5a5a62;
            --text-muted: #a0a0aa;
            --brand-start: #e88a3a;
            --brand-end: #d96c2b;
            --shadow: rgba(0, 0, 0, 0.04);
            --input-bg: #f5f5f7;
        }

        body.dark {
            --bg: #0b0a16;
            --surface: #1a1a28;
            --border: #2a2a3e;
            --text-primary: #f0f0f4;
            --text-secondary: #a8a8b8;
            --text-muted: #6a6a7a;
            --brand-start: #f6b868;
            --brand-end: #ee7b4a;
            --shadow: rgba(0, 0, 0, 0.3);
            --input-bg: #1e1e30;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            line-height: 1.5;
            margin: 0;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        /* ===== دکمه تغییر تم (همانند صفحه اصلی) ===== */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px var(--shadow);
            z-index: 999;
        }

        .theme-toggle:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* ===== لوگو ===== */
        .logo-wrapper {
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-wrapper img {
            max-width: 200px;
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.2rem;
            transition: filter 0.3s ease;
        }

        body.dark .logo-wrapper img {
            filter: brightness(1.05) contrast(1.02);
        }

        .logo-fallback {
            font-size: 1rem;
            color: var(--text-muted);
            background: var(--surface);
            padding: 1.5rem 2.5rem;
            border-radius: 1.5rem;
            border: 1px dashed var(--border);
            display: none;
        }

        /* ===== کد خطا ===== */
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 0.5rem;
            letter-spacing: -0.04em;
        }

        /* ===== عنوان و توضیح ===== */
        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1.2;
            margin: 0.5rem 0 0.75rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .highlight {
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subhead {
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto 2rem auto;
            line-height: 1.7;
        }

        /* ===== دکمه‌ها ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 2.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(217, 108, 43, 0.15);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(217, 108, 43, 0.2);
        }

        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.8rem 2.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
            border-color: var(--brand-end);
        }

        /* ===== فوتر ===== */
        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 1.8rem;
            margin-top: 0.5rem;
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
            font-weight: 400;
        }

        .footer a:hover {
            color: var(--brand-end);
        }

        /* ===== واکنش‌گرایی ===== */
        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .subhead {
                font-size: 0.95rem;
            }
            .btn-primary, .btn-secondary {
                width: 100%;
                justify-content: center;
            }
            .logo-wrapper img {
                max-width: 140px;
            }
            .theme-toggle {
                top: 0.8rem;
                right: 0.8rem;
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== دکمه تغییر تم ===== -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌗 Dark / Light</button>

    <div class="container">

        <!-- ===== لوگو (همانند صفحه اصلی) ===== -->
        <div class="logo-wrapper">
            <img src="Chichiny.png" alt="Chichiny Logo – Share thoughts. Create connections." />
            <div class="logo-fallback">✨ chichiny · logo</div>
        </div>

        <!-- ===== کد خطا ===== -->
        <div class="error-code">404</div>

        <!-- ===== عنوان ===== -->
        <h1>
            You've drifted off<br />
            <span class="highlight">the main stream</span>
        </h1>

        <!-- ===== توضیح ===== -->
        <p class="subhead">
            This page isn't flowing in our timeline right now.<br />
            Maybe it's gone, or maybe the link took a wrong turn.
        </p>

        <!-- ===== دکمه‌ها ===== -->
        <div class="btn-group">
            <a href="/" class="btn-primary">
                <span>🏠</span> Back to the stream
            </a>
            <a href="javascript:history.back()" class="btn-secondary">
                <span>↩️</span> Go back
            </a>
        </div>

        <!-- ===== فوتر ===== -->
        <div class="footer">
            <span>© 2026 Chichiny</span>
            <a href="#">Privacy</a>
            <a href="#">@chichiny</a>
            <a href="#">Beta</a>
        </div>

    </div>

    <script>
        // ============================================================
        // تغییر تم (Dark / Light) با ذخیره‌سازی در localStorage
        // ============================================================
        const toggle = document.getElementById('themeToggle');
        const body = document.body;

        // بارگذاری تم ذخیره‌شده
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const theme = body.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', theme);
        });

        // ============================================================
        // (اختیاری) هماهنگی با تم اصلی سایت
        // اگر کاربر از صفحه اصلی به اینجا آمده، تم را هماهنگ می‌کنیم
        // ============================================================
        console.log('✅ Chichiny 404 page loaded – stay in the stream.');
    </script>

</body>
</html>
