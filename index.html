<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chichiny · Coming Soon</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

    <!-- Favicon (اختیاری) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <style>
        /* ===== Reset & CSS Variables (همان کد قبلی، تغییری نکرده) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #ffffff;
            --surface: #f8f8fa;
            --border: #efeff1;
            --text-primary: #1a1a1e;
            --text-secondary: #5a5a62;
            --text-muted: #a0a0aa;
            --brand-start: #e88a3a;
            --brand-end: #d96c2b;
            --shadow: rgba(0, 0, 0, 0.04);
            --input-bg: #f5f5f7;
            --logo-border: #d96c2b;
            --logo-bg: #ffffff;
            --success: #2e7d32;
            --error: #d32f2f;
        }
        body.dark {
            --bg: #0b0a16;
            --surface: #1a1a28;
            --border: #2a2a3e;
            --text-primary: #f0f0f4;
            --text-secondary: #a8a8b8;
            --text-muted: #6a6a7a;
            --brand-start: #f6b868;
            --brand-end: #ee7b4a;
            --shadow: rgba(0, 0, 0, 0.3);
            --input-bg: #1e1e30;
            --logo-border: #f6b868;
            --logo-bg: #0b0a16;
            --success: #66bb6a;
            --error: #ef5350;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            line-height: 1.5;
        }
        .container { max-width: 720px; width: 100%; text-align: center; }

        /* دکمه تغییر تم */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px var(--shadow);
            z-index: 999;
        }
        .theme-toggle:hover { background: var(--border); color: var(--text-primary); }

        /* لوگو */
        .logo-wrapper {
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-wrapper img {
            max-width: 640px;
            width: 100%;
            height: auto;
            display: block;
            border-radius: 1.2rem;
            transition: filter 0.3s ease;
        }
        body.dark .logo-wrapper img { filter: brightness(1.05) contrast(1.02); }

        /* ===== متن‌های مرموز جدید ===== */
        .mystic-title {
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .mystic-title span {
            display: block;
            font-weight: 700;
            font-size: clamp(2.4rem, 6vw, 4.2rem);
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 0.2rem;
        }
        .mystic-sub {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            opacity: 0.6;
        }

        /* شمارنده (همان) */
        .counter {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.8rem;
            flex-wrap: wrap;
        }
        .counter-item {
            background: var(--surface);
            border-radius: 1.2rem;
            padding: 0.4rem 1.2rem;
            min-width: 60px;
            border: 1px solid var(--border);
        }
        .counter-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--brand-end);
            display: block;
            line-height: 1.2;
        }
        .counter-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        /* فرم (همان) */
        .form-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            max-width: 480px;
            margin: 0 auto 1.2rem auto;
        }
        .form-wrapper input {
            flex: 1 1 200px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }
        .form-wrapper input:focus {
            border-color: var(--brand-end);
            background: var(--bg);
            box-shadow: 0 0 0 3px rgba(217, 108, 43, 0.08);
        }
        .form-wrapper input::placeholder { color: var(--text-muted); }
        .form-wrapper button {
            background: linear-gradient(135deg, var(--brand-start), var(--brand-end));
            border: none;
            border-radius: 2rem;
            padding: 0.8rem 2.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(217, 108, 43, 0.15);
            min-width: 140px;
        }
        .form-wrapper button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(217, 108, 43, 0.2);
        }
        .form-wrapper button:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-feedback {
            display: block;
            font-size: 0.8rem;
            min-height: 1.6rem;
            margin: 0.2rem auto 0.8rem auto;
            color: var(--text-muted);
            transition: 0.25s;
        }
        .form-feedback.success { color: var(--success); }
        .form-feedback.error { color: var(--error); }

        /* فوتر */
        .footer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 1.8rem;
            margin-top: 0.5rem;
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: 0.2s;
            font-weight: 400;
        }
        .footer a:hover { color: var(--brand-end); }

        @media (max-width: 480px) {
            .counter-item { min-width: 50px; padding: 0.3rem 0.8rem; }
            .counter-number { font-size: 1.6rem; }
            .form-wrapper input { flex: 1 1 100%; text-align: center; }
            .form-wrapper button { width: 100%; }
            .logo-wrapper img { max-width: 160px; }
            .theme-toggle { top: 0.8rem; right: 0.8rem; font-size: 0.7rem; padding: 0.3rem 0.8rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌗 Dark / Light</button>

    <div class="container">

        <!-- لوگو (همان) -->
        <div class="logo-wrapper">
            <img src="Chichiny.png" alt="Chichiny Logo" />
            <div class="logo-fallback">✨ chichiny · logo</div>
        </div>

        <!-- ===== متن مرموز جدید (جایگزین brand و title و subhead) ===== -->
        <div class="mystic-title">
            <span>something is coming.</span>
        </div>
        <div class="mystic-sub">— are you ready? —</div>

        <!-- ===== ویژگی‌ها حذف شدند ===== -->

        <!-- شمارنده (همان) -->
        <div class="counter">
            <div class="counter-item">
                <span class="counter-number" id="days">00</span>
                <span class="counter-label">days</span>
            </div>
            <div class="counter-item">
                <span class="counter-number" id="hours">00</span>
                <span class="counter-label">hours</span>
            </div>
            <div class="counter-item">
                <span class="counter-number" id="minutes">00</span>
                <span class="counter-label">min</span>
            </div>
            <div class="counter-item">
                <span class="counter-number" id="seconds">00</span>
                <span class="counter-label">sec</span>
            </div>
        </div>

        <!-- ===== فرم ===== -->
        <div class="form-wrapper">
            <input type="email" id="emailInput" placeholder="your signal" aria-label="Email address" required />
            <button type="button" id="submitBtn">receive the call</button>
        </div>
        <span class="form-feedback" id="formFeedback">— first 1000 will decode it —</span>

        <div class="footer">
            <span>© 2026 Chichiny</span>
            <a href="#">Privacy</a>
            <a href="#">@chichiny</a>
        </div>

    </div>

    <script>
        // ===== شمارنده (همان) =====
        const target = new Date();
        target.setDate(target.getDate() + 30);

        function pad(n) { return String(n).padStart(2, '0'); }

        function updateCounter() {
            const diff = Math.max(0, target - new Date());
            document.getElementById('days').textContent = pad(Math.floor(diff / (1000 * 60 * 60 * 24)));
            document.getElementById('hours').textContent = pad(Math.floor((diff / (1000 * 60 * 60)) % 24));
            document.getElementById('minutes').textContent = pad(Math.floor((diff / (1000 * 60)) % 60));
            document.getElementById('seconds').textContent = pad(Math.floor((diff / 1000) % 60));
        }

        updateCounter();
        setInterval(updateCounter, 1000);

        // ===== تغییر تم (همان) =====
        const toggle = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark');
        }

        toggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
        });

        // ===== فرم ارسال به Google Apps Script (همان) =====
        const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxeClfZaWm5YGpXae31LqzvYjivyys2KNPYs-Hey3wLgu_tRNhBGcxlNIMU1pb_6nFL/exec';

        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        const feedback = document.getElementById('formFeedback');

        function setFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = 'form-feedback';
            if (type) feedback.classList.add(type);
        }

        submitBtn.addEventListener('click', function() {
            const email = emailInput.value.trim();

            if (!email || !email.includes('@') || !email.includes('.')) {
                setFeedback('⚠️ invalid signal.', 'error');
                emailInput.focus();
                return;
            }

            this.disabled = true;
            this.textContent = 'sending...';
            setFeedback('⏳ transmitting...', '');

            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(() => {
                setFeedback('✅ signal received.', 'success');
                emailInput.value = '';
                this.disabled = false;
                this.textContent = 'receive the call';
            })
            .catch(() => {
                setFeedback('❌ transmission failed. try again.', 'error');
                this.disabled = false;
                this.textContent = 'receive the call';
            });
        });

        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitBtn.click();
            }
        });
    </script>

</body>
</html>
