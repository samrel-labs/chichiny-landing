<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chichiny – Coming Soon</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* ----- Reset & Base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #0b0a16 0%, #1a1433 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      color: #ffffff;
      line-height: 1.6;
    }

    .container {
      max-width: 820px;
      width: 100%;
      text-align: center;
      padding: 1rem 0;
    }

    /* ----- Logo / Brand ----- */
    .brand {
      display: inline-block;
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f6b868 0%, #ee7b4a 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .brand-sub {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 2.2rem;
      display: block;
    }

    /* ----- Headline ----- */
    h1 {
      font-size: clamp(2.4rem, 7vw, 4.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.2rem;
      letter-spacing: -0.02em;
    }

    .highlight {
      background: linear-gradient(145deg, #f6b868, #ee7b4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subhead {
      font-size: 1.2rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      max-width: 560px;
      margin: 0 auto 2.8rem auto;
      line-height: 1.7;
    }

    /* ----- Counter ----- */
    .counter {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .counter-item {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.4rem;
      padding: 0.8rem 1.6rem;
      min-width: 75px;
      transition: 0.25s ease;
    }

    .counter-item:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(246, 184, 104, 0.2);
    }

    .counter-number {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f6b868;
      display: block;
      line-height: 1.1;
    }

    .counter-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 0.2rem;
      display: block;
    }

    /* ----- Notify Form ----- */
    .form-wrapper {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 2.2rem;
      padding: 0.5rem;
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      max-width: 520px;
      width: 100%;
      margin: 0 auto 2.2rem auto;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .form-wrapper input {
      flex: 1 1 200px;
      background: transparent;
      border: none;
      padding: 0.9rem 1.5rem;
      color: #ffffff;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      min-width: 160px;
    }

    .form-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 400;
    }

    .form-wrapper button {
      background: linear-gradient(145deg, #f6b868, #ee7b4a);
      border: none;
      padding: 0.9rem 2.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: #0b0a16;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: 0.01em;
    }

    .form-wrapper button:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(238, 123, 74, 0.25);
    }

    .form-note {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.2);
      margin-top: -0.5rem;
      margin-bottom: 2.5rem;
      display: block;
    }

    /* ----- Social / Footer ----- */
    .footer {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.12);
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      padding-top: 2rem;
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem 2rem;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
      transition: 0.2s;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .footer a:hover {
      color: #f6b868;
    }

    .footer span {
      opacity: 0.3;
    }

    /* ----- Responsive ----- */
    @media (max-width: 500px) {
      .brand {
        font-size: 2.6rem;
      }
      .counter-item {
        min-width: 60px;
        padding: 0.6rem 1rem;
      }
      .counter-number {
        font-size: 2rem;
      }
      .form-wrapper {
        border-radius: 2rem;
        padding: 0.3rem;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.03);
      }
      .form-wrapper input {
        width: 100%;
        text-align: center;
        padding: 0.8rem 1rem;
      }
      .form-wrapper button {
        width: 100%;
        justify-content: center;
        padding: 0.8rem;
      }
      .subhead {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Brand -->
  <div class="brand">chichiny</div>
  <span class="brand-sub">coming soon</span>

  <!-- Headline -->
  <h1>
    Your neighborhood <br />
    <span class="highlight">in a new light</span>
  </h1>
  <p class="subhead">
    A fresh social space for nearby conversations, local discoveries, and real connections.
  </p>

  <!-- Counter -->
  <div class="counter">
    <div class="counter-item">
      <span class="counter-number" id="days">00</span>
      <span class="counter-label">Days</span>
    </div>
    <div class="counter-item">
      <span class="counter-number" id="hours">00</span>
      <span class="counter-label">Hours</span>
    </div>
    <div class="counter-item">
      <span class="counter-number" id="minutes">00</span>
      <span class="counter-label">Minutes</span>
    </div>
    <div class="counter-item">
      <span class="counter-number" id="seconds">00</span>
      <span class="counter-label">Seconds</span>
    </div>
  </div>

  <!-- Email Form -->
  <div class="form-wrapper">
    <input type="email" placeholder="Enter your email" aria-label="Email address" />
    <button type="button">Notify me</button>
  </div>
  <span class="form-note">No spam, only launch updates.</span>

  <!-- Footer -->
  <div class="footer">
    <span>© 2026 Chichiny</span>
    <a href="#">Privacy</a>
    <a href="#">Support</a>
    <a href="#">@chichiny</a>
  </div>

</div>

<script>
  // --- Counter: 30 days from now ---
  const target = new Date();
  target.setDate(target.getDate() + 30);

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function updateCounter() {
    const now = new Date();
    const diff = Math.max(0, target - now);

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = pad(days);
    document.getElementById('hours').textContent = pad(hours);
    document.getElementById('minutes').textContent = pad(minutes);
    document.getElementById('seconds').textContent = pad(seconds);
  }

  updateCounter();
  setInterval(updateCounter, 1000);

  // --- Simple email notification (placeholder) ---
  document.querySelector('.form-wrapper button').addEventListener('click', function () {
    const input = document.querySelector('.form-wrapper input');
    const email = input.value.trim();
    if (email && email.includes('@')) {
      alert('Thank you! We\'ll notify you at ' + email);
      input.value = '';
    } else {
      alert('Please enter a valid email address.');
      input.focus();
    }
  });
</script>

</body>
</html>
